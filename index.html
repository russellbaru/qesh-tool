<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QESH Inspection Builder</title>

  <!--
    SINGLE-FILE QESH INSPECTION BUILDER
    ===================================
    No build step, no npm install, no Node.js required. Just open this file
    in a browser. Everything you need is loaded from CDNs (which are cached
    after first load, so subsequent opens are fast and work offline).

    Architecture:
      1. Tailwind CSS via CDN script — provides utility classes inline.
      2. React + ReactDOM via esm.sh — modern ESM CDN.
      3. docx (Word generation) and idb-keyval (IndexedDB wrapper) via esm.sh.
      4. Babel Standalone compiles JSX in the browser at load time.
         Adds ~1s to first page load. Fine for a personal tool used twice
         a week. If it ever feels slow, the build-step version is in the
         qesh-builder.zip.

      The ESM imports happen in a <script type="module"> block at the top.
      Those modules get stashed on window.__deps so the Babel-transformed
      code below can find them synchronously.
  -->

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config — set the accent color used throughout the app.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { 50: '#eff6ff', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' }
          }
        }
      }
    };
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* Splash shown until the app boots */
    #boot-splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 12px;
      background: #fafafa; color: #6b7280; font-size: 14px;
    }
    #boot-splash.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid #e5e7eb;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!--
    Step 1: Declare an import map so all our deps + their internal deps
    resolve to consistent versions. This is the pattern esm.sh recommends
    for avoiding the "two Reacts loaded" pitfall.

    We use major-version pins (@18, @8, @6) instead of exact patch versions,
    because exact patches can occasionally fail on esm.sh due to its
    internal version resolution. Major-version pins always resolve to the
    latest stable.
  -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client?deps=react@18",
        "docx": "https://esm.sh/docx@8?deps=react@18",
        "idb-keyval": "https://esm.sh/idb-keyval@6"
      }
    }
  </script>

  <!--
    Step 2: Load deps via the import map and stash them on window for
    the Babel block to pick up.
  -->
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import * as docx from 'docx';
    import * as idbKeyval from 'idb-keyval';

    window.__deps = { React, createRoot, docx, idbKeyval };
    window.__depsReady = true;
    window.dispatchEvent(new Event('deps-ready'));
  </script>

  <!--
    Step 3: Load Babel Standalone for JSX compilation.
    `data-presets="react"` on the script below tells Babel to compile JSX.
  -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="boot-splash">
    <div class="spinner"></div>
    <div>Loading QESH Inspection Builder…</div>
    <div style="font-size: 12px; color: #9ca3af; max-width: 320px; text-align: center;">
      First load fetches a few libraries from CDN (about 1MB total).
      Subsequent loads are cached and instant.
    </div>
  </div>

  <!--
    Step 3: The actual app, JSX compiled in-browser by Babel.
    We wrap everything in a function that waits for window.__deps to be ready.
  -->
  <script type="text/babel" data-presets="react" data-type="module">
    /* eslint-disable */
    // Wait for the ESM imports above to finish loading before booting.
    function whenDepsReady(cb) {
      if (window.__depsReady) cb();
      else window.addEventListener('deps-ready', cb, { once: true });
    }

    whenDepsReady(() => {
      const { React, createRoot, docx, idbKeyval } = window.__deps;
      const { useState, useEffect, useRef, useCallback } = React;

      const {
        Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
        ImageRun, AlignmentType, BorderStyle, WidthType, HeightRule, VerticalAlign
      } = docx;

      const { get: idbGet, set: idbSet, del: idbDel, keys: idbKeys, createStore } = idbKeyval;

      // ============================================================
      // STORAGE LAYER
      //   - localStorage holds the report shape (text + photo refs)
      //   - IndexedDB holds the photo Blobs themselves
      //   - Backups serialize photos to base64 for portable JSON files
      // ============================================================
      const photoStore = createStore('qesh-photos', 'photos');
      const REPORT_KEY = 'qesh.report.v1';

      function emptyReport() {
        return {
          inspectionDate: '',
          projectName: '',
          contractorName: '',
          conclusion: '',
          cards: []
        };
      }

      function loadReport() {
        try {
          const raw = localStorage.getItem(REPORT_KEY);
          if (!raw) return emptyReport();
          return { ...emptyReport(), ...JSON.parse(raw) };
        } catch { return emptyReport(); }
      }

      function saveReport(report) {
        localStorage.setItem(REPORT_KEY, JSON.stringify(report));
      }

      function clearReport() { localStorage.removeItem(REPORT_KEY); }

      async function putPhoto(blob) {
        const id = 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        await idbSet(id, blob, photoStore);
        return id;
      }
      async function getPhoto(id) {
        try { return (await idbGet(id, photoStore)) || null; }
        catch { return null; }
      }
      async function deletePhoto(id) {
        try { await idbDel(id, photoStore); } catch {}
      }

      // Garbage-collect orphaned photo blobs not referenced by any card.
      async function gcOrphanPhotos(report) {
        const referenced = new Set();
        (report.cards || []).forEach(c => {
          (c.photos || []).forEach(p => p.photoId && referenced.add(p.photoId));
          (c.findings || []).forEach(f => (f.photos || []).forEach(p => p.photoId && referenced.add(p.photoId)));
        });
        const all = await idbKeys(photoStore);
        await Promise.all(all
          .filter(k => typeof k === 'string' && !referenced.has(k))
          .map(k => idbDel(k, photoStore)));
      }

      async function wipeAll() {
        clearReport();
        const all = await idbKeys(photoStore);
        await Promise.all(all.map(k => idbDel(k, photoStore)));
      }

      function blobToDataURL(blob) {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(blob);
        });
      }
      async function dataURLToBlob(dataUrl) {
        return (await fetch(dataUrl)).blob();
      }

      async function exportBackup(report) {
        const photos = {};
        const ids = new Set();
        (report.cards || []).forEach(c => {
          (c.photos || []).forEach(p => p.photoId && ids.add(p.photoId));
          (c.findings || []).forEach(f => (f.photos || []).forEach(p => p.photoId && ids.add(p.photoId)));
        });
        for (const id of ids) {
          const blob = await getPhoto(id);
          if (blob) photos[id] = await blobToDataURL(blob);
        }
        return JSON.stringify({ version: 1, savedAt: new Date().toISOString(), report, photos }, null, 2);
      }

      async function importBackup(jsonString) {
        const parsed = JSON.parse(jsonString);
        if (parsed.version !== 1 || !parsed.report) throw new Error('Unrecognized backup file.');
        await wipeAll();
        for (const [id, dataUrl] of Object.entries(parsed.photos || {})) {
          const blob = await dataURLToBlob(dataUrl);
          await idbSet(id, blob, photoStore);
        }
        saveReport(parsed.report);
        return parsed.report;
      }

      // ============================================================
      // PHOTO PROCESSING — resize + EXIF strip via canvas re-encode
      // ============================================================
      const TARGET_W = 1200;
      const TARGET_H = 900;
      const JPEG_QUALITY = 0.82;

      async function processPhoto(file) {
        if (!/^image\/(jpeg|jpg|png)$/i.test(file.type)) {
          throw new Error('Only JPEG and PNG accepted.');
        }
        let bitmap;
        try {
          bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
        } catch {
          bitmap = await loadImageElement(file);
        }
        const { width, height } = fitWithin(bitmap.width, bitmap.height, TARGET_W, TARGET_H);
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(width));
        canvas.height = Math.max(1, Math.round(height));
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        if (bitmap.close) bitmap.close();
        const blob = await new Promise((resolve, reject) =>
          canvas.toBlob(b => b ? resolve(b) : reject(new Error('Encode failed')), 'image/jpeg', JPEG_QUALITY));
        return { blob, width: canvas.width, height: canvas.height, sizeBytes: blob.size };
      }

      function fitWithin(srcW, srcH, dstW, dstH) {
        if (srcW <= dstW && srcH <= dstH) return { width: srcW, height: srcH };
        const ratio = Math.min(dstW / srcW, dstH / srcH);
        return { width: srcW * ratio, height: srcH * ratio };
      }
      function loadImageElement(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
          img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not decode image')); };
          img.src = url;
        });
      }

      function blobToObjectUrl(blob) { return URL.createObjectURL(blob); }

      // ============================================================

      // We decode it once at module load into a Uint8Array so docgen can drop
      // it into ImageRun without async work. Logo is 600x230 px, displayed at
      // ~1.6" wide which fits the 1.92" logo cell with a small margin.

      // Findings table: 0.49" / 2.06" / 4.72" — measured from the template.
      // (Spec said Work Activity was 1.87"; the template uses 2.06".)
      const COL_FIND_NO = inch(0.49);
      const COL_FIND_ACT = inch(2.06);
      const COL_FIND_DESC = CONTENT_W - COL_FIND_NO - COL_FIND_ACT;

      // Photo box: max 4.02" x 3.01" but aspect ratio is preserved (see
      // photoParagraph below — portrait photos stay portrait, fit-within).
      const PHOTO_MAX_W_PX = 4.02 * 96;
      const PHOTO_MAX_H_PX = 3.01 * 96;

      const SINGLE = { style: BorderStyle.SINGLE, size: 6, color: '000000' };
      const ALL_BORDERS = { top: SINGLE, bottom: SINGLE, left: SINGLE, right: SINGLE };

      // The corporate template uses "Sunway Sans_beta" at 11pt. Most machines
      // won't have that font, so Word will fall back to a default — but we
      // declare it as the primary so the corporate machines that DO have it
      // render correctly. Calibri is a sensible visual fallback.
      const FONT = 'Sunway Sans_beta';
      const SIZE = 22; // 11pt in half-points (was 24 = 12pt)

      const DEFAULT_COMPLIANCE = [
        'Occupational Safety and Health Act 1994 (Amendment 2022)',
        'Environmental Quality Act 1974 (Amendment 2024)'
      ];

      function P({ text = '', bold = false, italic = false, align, children, spacing } = {}) {
        if (children) return new Paragraph({ alignment: align, spacing: spacing || { before: 0, after: 0 }, children });
        return new Paragraph({
          alignment: align,
          spacing: spacing || { before: 0, after: 0 },
          children: [new TextRun({ text, bold, italics: italic, font: FONT, size: SIZE })]
        });
      }
      function TR(text, opts = {}) {
        return new TextRun({ text, bold: !!opts.bold, italics: !!opts.italic, font: FONT, size: SIZE });
      }
      function emptyP() { return new Paragraph({ children: [new TextRun({ text: '', font: FONT, size: SIZE })] }); }
      function cell({ children, width, borders = ALL_BORDERS, shading, verticalAlign = VerticalAlign.TOP, columnSpan }) {
        const opts = {
          borders,
          width: { size: width, type: WidthType.DXA },
          margins: { top: 80, bottom: 80, left: 120, right: 120 },
          verticalAlign,
          children: children && children.length ? children : [emptyP()]
        };
        if (shading) opts.shading = shading;
        if (columnSpan) opts.columnSpan = columnSpan;
        return new TableCell(opts);
      }

      function formatDateLong(yyyymmdd) {
        if (!yyyymmdd) return '';
        const [y, m, d] = yyyymmdd.split('-');
        if (!y || !m || !d) return yyyymmdd;
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        return `${d.padStart(2,'0')} ${months[parseInt(m,10)-1]} ${y}`;
      }

      async function blobToArrayBuffer(blob) {
        if (blob.arrayBuffer) return blob.arrayBuffer();
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsArrayBuffer(blob);
        });
      }

      async function photoParagraph(photoRef) {
        if (!photoRef?.photoId) return P({ text: '[Photo missing]', italic: true });
        const blob = await getPhoto(photoRef.photoId);
        if (!blob) return P({ text: '[Photo missing]', italic: true });
        const data = new Uint8Array(await blobToArrayBuffer(blob));

        // Fit-within: keep the photo's aspect ratio, scale down so it fits in
        // a 4.02" x 3.01" box. Landscape photos hit the width limit at 4.02";
        // portrait photos hit the height limit at 3.01".
        const srcW = photoRef.width  || PHOTO_MAX_W_PX;
        const srcH = photoRef.height || PHOTO_MAX_H_PX;
        const ratio = Math.min(PHOTO_MAX_W_PX / srcW, PHOTO_MAX_H_PX / srcH, 1);
        const w = Math.round(srcW * ratio);
        const h = Math.round(srcH * ratio);

        return new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { before: 60, after: 60 },
          children: [new ImageRun({
            data,
            transformation: { width: w, height: h },
            type: 'jpg'
          })]
        });
      }

      function buildCoverPage(report) {
        const { inspectionDate, projectName, contractorName } = report;

        // Logo row: left cell shows the embedded Sunway Property logo, right
        // cell shows the hardcoded client name in bold. Note: the contractor
        // name from the form does NOT go here — that goes in the info table
        // below. The right side of the logo row is always the client.
        const logoTable = new Table({
          width: { size: CONTENT_W, type: WidthType.DXA },
          columnWidths: [COL_LOGO_LEFT, COL_LOGO_RIGHT],
          rows: [new TableRow({
            height: { value: inch(1.0), rule: HeightRule.ATLEAST },
            children: [
              cell({ width: COL_LOGO_LEFT,
                     verticalAlign: VerticalAlign.CENTER,
                     children: [new Paragraph({
                       alignment: AlignmentType.CENTER,
                       spacing: { before: 0, after: 0 },
                       children: [new ImageRun({
                         data: COMPANY_LOGO_BYTES,
                         transformation: { width: COMPANY_LOGO_W_PX, height: COMPANY_LOGO_H_PX },
                         type: 'jpg'
                       })]
                     })] }),
              cell({ width: COL_LOGO_RIGHT,
                     verticalAlign: VerticalAlign.CENTER,
                     children: [P({ text: CLIENT_NAME, bold: true, align: AlignmentType.CENTER })] }),
            ]
          })]
        });

        const title = new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { before: 240, after: 240 },
          children: [new TextRun({ text: 'COE - QESH INSPECTION REPORT', bold: true, font: FONT, size: 28 })]
          // size 28 = 14pt for the title (was 16pt; template uses ~14pt)
        });

        // Info table — 2 rows total:
        //   Row 1: three cells, each with a bold header on top
        //          ("INSPECTION DATE:" / "PROJECT:" / "CONTRACTORS:") followed
        //          by the value on the next line in the same cell.
        //   Row 2: full-width merged cell with bold "Description:" header
        //          followed by the description paragraph.
        function headerValueCell(width, header, value) {
          return cell({
            width,
            children: [
              P({ text: header, bold: true }),
              P({ text: value || '' })
            ]
          });
        }
        const infoRow1 = new TableRow({
          height: { value: inch(0.6), rule: HeightRule.ATLEAST },
          children: [
            headerValueCell(COL_INFO_DATE, 'INSPECTION DATE:', formatDateLong(inspectionDate)),
            headerValueCell(COL_INFO_PROJ, 'PROJECT:',         projectName || ''),
            headerValueCell(COL_INFO_CONT, 'CONTRACTORS:',     contractorName || ''),
          ]
        });
        const descRow = new TableRow({
          children: [cell({
            width: CONTENT_W, columnSpan: 3,
            children: [
              P({ text: 'Description:', bold: true }),
              new Paragraph({
                spacing: { before: 0, after: 0 },
                children: [
                  TR('This report documents the findings of inspection conducted to assess compliance with applicable '),
                  TR('Quality, Environmental, Safety and Health (ESH)', { bold: true }),
                  TR(' requirements at the above location.')
                ]
              })
            ]
          })]
        });
        const infoTable = new Table({
          width: { size: CONTENT_W, type: WidthType.DXA },
          columnWidths: [COL_INFO_DATE, COL_INFO_PROJ, COL_INFO_CONT],
          rows: [infoRow1, descRow]
        });

        const list = report.complianceList && report.complianceList.length ? report.complianceList : DEFAULT_COMPLIANCE;
        const complianceChildren = [P({ text: 'Inspection for compliance to the following documents:', bold: true })];
        list.forEach((item, i) => complianceChildren.push(P({ text: `${i + 1}. ${item}` })));
        const complianceTable = new Table({
          width: { size: CONTENT_W, type: WidthType.DXA },
          columnWidths: [CONTENT_W],
          rows: [new TableRow({ children: [cell({ width: CONTENT_W, children: complianceChildren })] })]
        });

        return [
          logoTable, title, infoTable, emptyP(), complianceTable,
          new Paragraph({ children: [new TextRun({ text: '', break: 1 })], pageBreakBefore: true })
        ];
      }

      async function buildFindingCellChildren(card) {
        const out = [];
        if (card.entryType === 'good') {
          // Template puts photos ABOVE the "Good Observation:" text — that
          // way the reader sees the visual evidence first, then the caption.
          for (const ph of (card.photos || [])) out.push(await photoParagraph(ph));
          out.push(new Paragraph({
            spacing: { before: 60, after: 60 },
            children: [TR('Good Observation: ', { bold: true }), TR(card.description || '')]
          }));
        } else {
          // Findings: photos first, then "Finding:" caption, then placeholder
          // lines for the contractor to fill in later.
          const items = (card.findings && card.findings.length)
            ? card.findings
            : [{ description: card.description || '', photos: card.photos || [] }];
          for (let i = 0; i < items.length; i++) {
            if (i > 0) out.push(emptyP());
            for (const ph of (items[i].photos || [])) out.push(await photoParagraph(ph));
            out.push(new Paragraph({
              spacing: { before: 60, after: 60 },
              children: [TR('Finding: ', { bold: true }), TR(items[i].description || '')]
            }));
            // Placeholder text that signals to the MC where to add their
            // rectification photo and description after the report is shared.
            out.push(new Paragraph({
              spacing: { before: 60, after: 0 },
              children: [TR('Rectify by MC: ', { bold: true }), TR('[Photo]', { bold: true })]
            }));
            out.push(new Paragraph({
              spacing: { before: 60, after: 0 },
              children: [TR('Rectification: ', { bold: true }), TR('[Description]', { bold: true })]
            }));
          }
        }
        if (!out.length) out.push(emptyP());
        return out;
      }

      async function buildFindingsTable(cards, conclusion) {
        const headerRow = new TableRow({
          tableHeader: true,
          children: [
            cell({ width: COL_FIND_NO, shading: { fill: 'D9D9D9' }, children: [P({ text: 'No.', bold: true, align: AlignmentType.CENTER })] }),
            cell({ width: COL_FIND_ACT, shading: { fill: 'D9D9D9' }, children: [P({ text: 'Work Activity', bold: true, align: AlignmentType.CENTER })] }),
            cell({ width: COL_FIND_DESC, shading: { fill: 'D9D9D9' }, children: [P({ text: 'Findings Description / Photo of Findings', bold: true, align: AlignmentType.CENTER })] }),
          ]
        });
        const rows = [headerRow];
        for (let i = 0; i < cards.length; i++) {
          const cellChildren = await buildFindingCellChildren(cards[i]);
          rows.push(new TableRow({
            children: [
              cell({ width: COL_FIND_NO, children: [P({ text: String(i + 1), align: AlignmentType.CENTER })] }),
              cell({ width: COL_FIND_ACT, children: [P({ text: cards[i].workActivity || '', bold: true })] }),
              cell({ width: COL_FIND_DESC, children: cellChildren }),
            ]
          }));
        }
        rows.push(new TableRow({
          children: [cell({
            width: CONTENT_W, columnSpan: 3,
            children: [new Paragraph({
              spacing: { before: 60, after: 60 },
              children: [TR('Conclusion: ', { bold: true }), TR(conclusion || '')]
            })]
          })]
        }));
        return new Table({
          width: { size: CONTENT_W, type: WidthType.DXA },
          columnWidths: [COL_FIND_NO, COL_FIND_ACT, COL_FIND_DESC],
          rows
        });
      }

      async function generateDocxBlob(report) {
        const cover = buildCoverPage(report);
        const findings = await buildFindingsTable(report.cards || [], report.conclusion);
        const doc = new Document({
          styles: { default: { document: { run: { font: FONT, size: SIZE } } } },
          sections: [{
            properties: {
              page: {
                size: { width: PAGE_W, height: PAGE_H },
                margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN }
              }
            },
            children: [...cover, findings]
          }]
        });
        return Packer.toBlob(doc);
      }

      function buildFilename(report) {
        const ymd = (report.inspectionDate || '').replace(/-/g, '');
        const proj = (report.projectName || 'Untitled')
          .replace(/[^a-zA-Z0-9 _\-]/g, '')
          .replace(/\s+/g, ' ')
          .trim() || 'Untitled';
        return `${ymd} COE QESH Inspection Report - ${proj}`;
      }

      // ============================================================
      // QUICK-SELECT TEMPLATES
      // ============================================================
      const ACTIVITY_TEMPLATES = [
        'Site Housekeeping','Working at Height','Scaffolding','Hot Works',
        'Concreting Works','Reinforcement Works','Excavation Works',
        'Lifting Operation','Confined Space','Material Storage',
        'Personal Protective Equipment','Electrical Safety','Fire Safety',
        'Environmental Management','Quality of Workmanship'
      ];
      const FINDING_TEMPLATES = [
        'Workers observed working at height without harness.',

        'Improper material stacking observed.',
        'Housekeeping inadequate at work area.',
        'Fire extinguisher inspection overdue.',
        'PPE not properly worn by workers.',
        'Honeycombing observed on concrete surface.',
        'Reinforcement spacing not as per drawing.',
        'Temporary electrical wiring not secured.',
        'Waste segregation not followed.'
      ];
      const GOOD_OBSERVATION_TEMPLATES = [
        'Site found clean and well organized.',
        'PPE properly worn by all workers.',
        'Good housekeeping practices observed.',
        'Scaffolding properly tagged and inspected.',
        'Material storage area well organized.',
        'Safety briefing observed before work.'
      ];

      // ============================================================
      // SHARED UI HELPERS
      // ============================================================
      function newId() { return Math.random().toString(36).slice(2, 10); }
      function newCard(entryType = 'finding') {
        return {
          cardId: newId(),
          entryType, category: 'Safety',
          workActivity: '', description: '',
          photos: [], findings: []
        };
      }
      function newFinding() { return { id: newId(), description: '', photos: [] }; }

      function formatTime(ts) {
        const d = new Date(ts);
        const day = String(d.getDate()).padStart(2, '0');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        let h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, '0');
        const ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12; if (h === 0) h = 12;
        return `${day} ${months[d.getMonth()]} ${d.getFullYear()} ${h}:${m}${ampm}`;
      }

      function collectCardPhotoIds(card) {
        const ids = [];
        (card.photos || []).forEach(p => p.photoId && ids.push(p.photoId));
        (card.findings || []).forEach(f => (f.photos || []).forEach(p => p.photoId && ids.push(p.photoId)));
        return ids;
      }

      function validate(r) {
        const errs = [];
        if (!r.inspectionDate) errs.push('Inspection Date is required.');
        if (!r.projectName?.trim()) errs.push('Project Name is required.');
        if (!r.cards || r.cards.length === 0) errs.push('Add at least one card.');
        (r.cards || []).forEach((c, i) => {
          if (c.entryType === 'finding') {
            const items = (c.findings && c.findings.length) ? c.findings : [{ photos: c.photos }];
            items.forEach((it, j) => {
              if (!it.photos || it.photos.length === 0) {
                errs.push(`Card ${i + 1}${items.length > 1 ? ` (finding ${j + 1})` : ''}: at least one photo is required.`);
              }
            });
          }
        });
        return errs;
      }

      // ============================================================
      // PHOTO THUMB / LIGHTBOX
      // ============================================================
      function PhotoThumb({ photoId, onClick, className, alt = '' }) {
        const [url, setUrl] = useState(null);
        useEffect(() => {
          let cancelled = false, created = null;
          (async () => {
            const blob = await getPhoto(photoId);
            if (cancelled || !blob) return;
            created = blobToObjectUrl(blob);
            setUrl(created);
          })();
          return () => {
            cancelled = true;
            if (created) URL.revokeObjectURL(created);
          };
        }, [photoId]);
        if (!url) return <div className={(className || '') + ' bg-gray-100 animate-pulse'} />;
        return <img src={url} alt={alt} className={className} onClick={onClick} />;
      }

      function PhotoLightbox({ photoId, onClose }) {
        const [url, setUrl] = useState(null);
        useEffect(() => {
          let cancelled = false, created = null;
          (async () => {
            const blob = await getPhoto(photoId);
            if (cancelled || !blob) return;
            created = blobToObjectUrl(blob);
            setUrl(created);
          })();
          const onKey = (e) => { if (e.key === 'Escape') onClose(); };
          window.addEventListener('keydown', onKey);
          return () => {
            cancelled = true;
            if (created) URL.revokeObjectURL(created);
            window.removeEventListener('keydown', onKey);
          };
        }, [photoId, onClose]);
        return (
          <div onClick={onClose} className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center cursor-pointer p-6">
            {url
              ? <img src={url} alt="" className="max-h-full max-w-full object-contain" onClick={e => e.stopPropagation()} />
              : <div className="text-white">Loading…</div>
            }
            <button onClick={onClose}
                    className="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 text-white text-xl">×</button>
          </div>
        );
      }

      // ============================================================
      // PHOTO EDITOR
      // ============================================================
      function PhotoEditor({ photos, onChange, onPreview, required }) {
        const [busy, setBusy] = useState(false);
        const [err, setErr] = useState(null);
        const dragIdx = useRef(null);

        async function handleFiles(fileList) {
          const files = Array.from(fileList || []);
          if (!files.length) return;
          setBusy(true); setErr(null);
          const added = [];
          try {
            for (const f of files) {
              try {
                const { blob, width, height } = await processPhoto(f);
                const photoId = await putPhoto(blob);
                added.push({ photoId, width, height });
              } catch (e) {
                console.error('photo failed:', f.name, e);
                setErr(`Skipped "${f.name}": ${e.message}`);
              }
            }
            if (added.length) onChange([...(photos || []), ...added]);
          } finally { setBusy(false); }
        }

        function removeAt(idx) {
          const ph = photos[idx];
          if (ph?.photoId) deletePhoto(ph.photoId);
          onChange(photos.filter((_, i) => i !== idx));
        }
        function onDragStart(idx) { dragIdx.current = idx; }
        function onDragOver(e, idx) {
          e.preventDefault();
          if (dragIdx.current === null || dragIdx.current === idx) return;
          const next = [...photos];
          const [moved] = next.splice(dragIdx.current, 1);
          next.splice(idx, 0, moved);
          dragIdx.current = idx;
          onChange(next);
        }
        function onDragEnd() { dragIdx.current = null; }

        const empty = !photos || photos.length === 0;
        return (
          <div>
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <label className="px-3 py-1.5 rounded border border-gray-300 bg-white text-sm cursor-pointer hover:bg-gray-50 inline-flex items-center gap-1">
                <span>📷</span> {busy ? 'Processing…' : 'Add photos'}
                <input type="file" accept="image/jpeg,image/png" multiple
                       onChange={e => { handleFiles(e.target.files); e.target.value = ''; }}
                       className="hidden" disabled={busy} />
              </label>
              <span className="text-xs text-gray-500">JPEG / PNG — auto-resized, EXIF stripped, drag to reorder</span>
            </div>
            {err && <div className="mb-2 text-xs text-red-600">{err}</div>}
            {required && empty && (
              <div className="mb-2 p-2 rounded border border-red-200 bg-red-50 text-red-600 text-xs">
                ⚠ At least one photo is required for findings.
              </div>
            )}
            {!empty && (
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                {photos.map((ph, idx) => (
                  <div key={ph.photoId}
                       className="relative group border border-gray-200 rounded overflow-hidden bg-gray-50"
                       draggable
                       onDragStart={() => onDragStart(idx)}
                       onDragOver={e => onDragOver(e, idx)}
                       onDragEnd={onDragEnd}>
                    <PhotoThumb photoId={ph.photoId}
                                className="w-full h-24 object-cover cursor-pointer block"
                                onClick={() => onPreview && onPreview(ph.photoId)} />
                    <button onClick={(e) => { e.stopPropagation(); removeAt(idx); }}
                            className="absolute top-1 right-1 w-6 h-6 rounded-full bg-black/60 text-white text-xs hover:bg-black/80 flex items-center justify-center">×</button>
                    <span className="absolute bottom-1 left-1 text-[10px] bg-black/60 text-white px-1 rounded">{idx + 1}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function FindingCard({ index, card, onChange, onRemove, onPreview,
                             onDragStartCard, onDragOverCard, onDragEndCard }) {
        const [draggable, setDraggable] = useState(false);
        const isGood = card.entryType === 'good';
        const hasMulti = !isGood && card.findings && card.findings.length > 0;

        function update(patch) { onChange({ ...card, ...patch }); }
        function setEntryType(t) {
          if (t === 'good') update({ entryType: 'good', findings: [] });
          else update({ entryType: 'finding' });
        }
        function setPhotos(photos) { update({ photos }); }
        function addAdditionalFinding() {
          let findings = card.findings, patch = {};
          if (!findings || findings.length === 0) {
            findings = [{ id: newId(), description: card.description || '', photos: card.photos || [] }];
            patch = { description: '', photos: [] };
          }
          update({ ...patch, findings: [...findings, newFinding()] });
        }
        function updateFinding(fid, patch) {
          update({ findings: card.findings.map(f => f.id === fid ? { ...f, ...patch } : f) });
        }
        function removeFinding(fid) {
          let findings = card.findings.filter(f => f.id !== fid);
          if (findings.length === 1) {
            const only = findings[0];
            update({ findings: [], description: only.description, photos: only.photos });
          } else {
            update({ findings });
          }
        }

        return (
          <div className="bg-white rounded-lg border border-gray-200 shadow-sm"
               draggable={draggable}
               onDragStart={onDragStartCard}
               onDragOver={onDragOverCard}
               onDragEnd={() => { setDraggable(false); onDragEndCard(); }}>
            <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50 rounded-t-lg">
              <div className="flex items-center gap-3 flex-wrap">
                <span className="cursor-grab text-gray-400 select-none px-1 text-lg leading-none"
                      title="Drag to reorder card"
                      onMouseDown={() => setDraggable(true)}
                      onMouseUp={() => setDraggable(false)}
                      onMouseLeave={() => setDraggable(false)}>≡</span>
                <span className="text-sm font-medium text-gray-700">Card {index + 1}</span>
                <EntryTypeToggle value={card.entryType} onChange={setEntryType} />
                <CategorySelect value={card.category} onChange={cat => update({ category: cat })} />
              </div>
              <button onClick={onRemove} className="text-sm text-red-500 hover:underline">Delete</button>
            </div>

            <div className="p-4 space-y-4">
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Work Activity</label>
                <input type="text" value={card.workActivity}
                       onChange={e => update({ workActivity: e.target.value })}
                       placeholder="e.g. Working at Height"
                       className="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-accent-500 focus:border-transparent" />
              </div>

              {isGood && (
                <SingleEntryEditor
                  label="Observation"
                  description={card.description}
                  onDescription={(v) => update({ description: v })}
                  templates={GOOD_OBSERVATION_TEMPLATES}
                  photos={card.photos}
                  onPhotos={setPhotos}
                  requirePhoto={false}
                  onPreview={onPreview} />
              )}
              {!isGood && !hasMulti && (
                <SingleEntryEditor
                  label="Finding"
                  description={card.description}
                  onDescription={(v) => update({ description: v })}
                  templates={FINDING_TEMPLATES}
                  photos={card.photos}
                  onPhotos={setPhotos}
                  requirePhoto={true}
                  onPreview={onPreview} />
              )}
              {!isGood && hasMulti && (
                <div className="space-y-3">
                  {card.findings.map((f, j) => (
                    <div key={f.id} className="border border-gray-200 rounded-lg p-3 bg-gray-50">
                      <div className="flex items-center justify-between mb-2">
                        <span className="text-xs font-medium text-gray-600">Finding {j + 1} of {card.findings.length}</span>
                        <button onClick={() => removeFinding(f.id)} className="text-xs text-red-500 hover:underline">Remove</button>
                      </div>
                      <FindingItemEditor
                        description={f.description}
                        onDescription={(v) => updateFinding(f.id, { description: v })}
                        photos={f.photos}
                        onPhotos={(photos) => updateFinding(f.id, { photos })}
                        templates={FINDING_TEMPLATES}
                        onPreview={onPreview} />
                    </div>
                  ))}
                </div>
              )}
              {!isGood && (
                <button onClick={addAdditionalFinding}
                        className="px-3 py-1.5 rounded border border-dashed border-gray-300 text-sm text-gray-600 hover:bg-gray-50">
                  + Add Another Finding under this Work Activity
                </button>
              )}
            </div>
          </div>
        );
      }

      // ============================================================
      // SECTIONS / HEADER / APP ROOT
      // ============================================================
      function Field({ label, hint, children }) {
        return (
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
            {children}
            {hint && <p className="text-xs text-gray-400 mt-1">{hint}</p>}
          </div>
        );
      }

      function SectionCard({ title, subtitle, children, num }) {
        return (
          <section className="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-gray-50 to-white">
              <div className="flex items-center gap-3">
                {num && <span className="w-7 h-7 rounded-full bg-accent-600 text-white text-sm font-medium flex items-center justify-center">{num}</span>}
                <div>
                  <h2 className="font-semibold text-gray-900">{title}</h2>
                  {subtitle && <p className="text-xs text-gray-500">{subtitle}</p>}
                </div>
              </div>
            </div>
            <div className="p-6">{children}</div>
          </section>
        );
      }

      function Header({ savedAt, onBackup, onRestore, onFresh }) {
        const restoreInputRef = useRef();
        return (
          <header className="bg-white border-b border-gray-200 px-6 py-3">
            <div className="max-w-5xl mx-auto flex items-center justify-between gap-4 flex-wrap">
              <div>
                <h1 className="font-semibold text-lg text-gray-800">QESH Inspection Builder</h1>
                <p className="text-xs text-gray-500">Draft saved locally · {formatTime(savedAt)}</p>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <button onClick={onBackup} className="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50">
                  Download backup
                </button>
                <button onClick={() => restoreInputRef.current?.click()}
                        className="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50">
                  Restore backup
                </button>
                <input ref={restoreInputRef} type="file" accept="application/json"
                       onChange={e => { if (e.target.files?.[0]) onRestore(e.target.files[0]); e.target.value = ''; }}
                       className="hidden" />
                <button onClick={onFresh}
                        className="px-3 py-1.5 rounded border border-red-200 bg-white text-red-600 hover:bg-red-50">
                  Start fresh
                </button>
              </div>
            </div>
          </header>
        );
      }

      function ReportInfoSection({ report, onUpdate }) {
        return (
          <SectionCard num={1} title="Report Info" subtitle="These fields populate the cover page.">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <Field label="Inspection Date *" hint="Used in file name and report header.">
                <input type="date" value={report.inspectionDate}
                       onChange={e => onUpdate('inspectionDate', e.target.value)}
                       className="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-accent-500 focus:border-transparent" />
              </Field>
              <Field label="Project Name *">
                <input type="text" value={report.projectName}
                       onChange={e => onUpdate('projectName', e.target.value)}
                       placeholder="e.g. New Sunway Hotel Seberang Jaya"
                       className="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-accent-500 focus:border-transparent" />
              </Field>
              <Field label="Contractor Name">
                <input type="text" value={report.contractorName}
                       onChange={e => onUpdate('contractorName', e.target.value)}
                       placeholder="e.g. Acme Builders Sdn Bhd"
                       className="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-accent-500 focus:border-transparent" />
              </Field>
              <Field label="Conclusion" hint="Appears as the last row of the report.">
                <textarea value={report.conclusion}
                          onChange={e => onUpdate('conclusion', e.target.value)}
                          rows={3}
                          placeholder="Overall conclusion of this inspection…"
                          className="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-accent-500 focus:border-transparent" />
              </Field>
            </div>
          </SectionCard>
        );
      }

      function FindingsSection({ cards, onUpdate, onRemove, onAdd, onPreview,
                                 onDragStart, onDragOver, onDragEnd }) {
        return (
          <SectionCard num={2} title="Findings" subtitle="Add findings and good observations. Drag cards to reorder.">
            <div className="space-y-4">
              {cards.length === 0 && (
                <p className="text-gray-500 text-sm text-center py-6">No cards yet. Add your first one below.</p>
              )}
              {cards.map((card, i) => (
                <FindingCard key={card.cardId}
                             index={i}
                             card={card}
                             onChange={(next) => onUpdate(card.cardId, next)}
                             onRemove={() => onRemove(card.cardId)}
                             onPreview={onPreview}
                             onDragStartCard={() => onDragStart(i)}
                             onDragOverCard={(e) => onDragOver(e, i)}
                             onDragEndCard={onDragEnd} />
              ))}
            </div>
            <div className="flex flex-wrap gap-2 mt-5">
              <button onClick={() => onAdd('finding')}
                      className="px-4 py-2 rounded bg-accent-600 hover:bg-accent-700 text-white text-sm font-medium">
                + Add Finding
              </button>
              <button onClick={() => onAdd('good')}
                      className="px-4 py-2 rounded border border-gray-300 bg-white hover:bg-gray-50 text-sm">
                + Add Good Observation
              </button>
            </div>
          </SectionCard>
        );
      }

      function ExportSection({ report, errors, exporting, onExport }) {
        const filename = buildFilename(report);
        const ready = report.inspectionDate && report.projectName?.trim() && report.cards?.length > 0;
        return (
          <SectionCard num={3} title="Export" subtitle="Download a Word document. Polish in Word as needed before sending.">
            <p className="text-sm text-gray-600 mb-1">File name:</p>
            <p className="font-mono text-base text-gray-900 mb-5 break-all">{filename}.docx</p>
            <button onClick={onExport} disabled={exporting || !ready}
                    className="px-5 py-2.5 rounded bg-accent-600 hover:bg-accent-700 text-white font-medium disabled:opacity-50 disabled:cursor-not-allowed">
              {exporting ? 'Generating…' : '⬇ Download .docx'}
            </button>
            {!ready && (
              <p className="text-xs text-gray-500 mt-2">Fill in date, project name, and at least one card to enable export.</p>
            )}
            {errors.length > 0 && (
              <div className="mt-4 p-4 rounded border border-red-200 bg-red-50 text-red-700 text-sm">
                <p className="font-medium mb-1">Cannot export:</p>
                <ul className="list-disc list-inside space-y-1">
                  {errors.map((e, i) => <li key={i}>{e}</li>)}
                </ul>
              </div>
            )}
          </SectionCard>
        );
      }

      function App() {
        const [report, setReport] = useState(loadReport);
        const [savedAt, setSavedAt] = useState(Date.now());
        const [previewPhotoId, setPreviewPhotoId] = useState(null);
        const [exporting, setExporting] = useState(false);
        const [errors, setErrors] = useState([]);

        useEffect(() => {
          saveReport(report);
          setSavedAt(Date.now());
        }, [report]);

        useEffect(() => {
          gcOrphanPhotos(report).catch(console.error);
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, []);

        function updateField(name, value) { setReport(r => ({ ...r, [name]: value })); }
        function updateCard(cardId, nextCard) {
          setReport(r => ({ ...r, cards: r.cards.map(c => c.cardId === cardId ? nextCard : c) }));
        }
        function removeCard(cardId) {
          if (!confirm('Delete this card?')) return;
          setReport(r => {
            const card = r.cards.find(c => c.cardId === cardId);
            if (card) collectCardPhotoIds(card).forEach(id => deletePhoto(id));
            return { ...r, cards: r.cards.filter(c => c.cardId !== cardId) };
          });
        }
        function addCard(entryType) {
          setReport(r => ({ ...r, cards: [...r.cards, newCard(entryType)] }));
        }

        const dragIdx = useRef(null);
        function onCardDragStart(idx) { dragIdx.current = idx; }
        function onCardDragOver(e, idx) {
          e.preventDefault();
          if (dragIdx.current === null || dragIdx.current === idx) return;
          setReport(r => {
            const next = [...r.cards];
            const [moved] = next.splice(dragIdx.current, 1);
            next.splice(idx, 0, moved);
            dragIdx.current = idx;
            return { ...r, cards: next };
          });
        }
        function onCardDragEnd() { dragIdx.current = null; }

        async function handleExport() {
          const errs = validate(report);
          if (errs.length) { setErrors(errs); return; }
          setErrors([]); setExporting(true);
          try {
            const blob = await generateDocxBlob(report);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = buildFilename(report) + '.docx';
            document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
          } catch (e) {
            console.error(e);
            setErrors(['Export failed: ' + e.message]);
          } finally {
            setExporting(false);
          }
        }

        async function downloadBackup() {
          const json = await exportBackup(report);
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `qesh-backup-${new Date().toISOString().slice(0,10)}.json`;
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
        }
        async function uploadBackup(file) {
          if (!confirm('Restoring will replace your current work. Continue?')) return;
          try {
            const text = await file.text();
            const restored = await importBackup(text);
            setReport(restored);
          } catch (e) {
            alert('Could not restore backup: ' + e.message);
          }
        }
        async function startFresh() {
          if (!confirm('Start a new report? Current work will be deleted.')) return;
          await wipeAll();
          setReport(loadReport());
        }

        return (
          <div className="min-h-screen flex flex-col">
            <Header savedAt={savedAt}
                    onBackup={downloadBackup}
                    onRestore={uploadBackup}
                    onFresh={startFresh} />
            <main className="flex-1 max-w-5xl mx-auto w-full p-6 pb-24 space-y-8">
              <ReportInfoSection report={report} onUpdate={updateField} />
              <FindingsSection
                cards={report.cards}
                onUpdate={updateCard}
                onRemove={removeCard}
                onAdd={addCard}
                onPreview={setPreviewPhotoId}
                onDragStart={onCardDragStart}
                onDragOver={onCardDragOver}
                onDragEnd={onCardDragEnd} />
              <ExportSection
                report={report}
                errors={errors}
                exporting={exporting}
                onExport={handleExport} />
            </main>
            {previewPhotoId && (
              <PhotoLightbox photoId={previewPhotoId} onClose={() => setPreviewPhotoId(null)} />
            )}
          </div>
        );
      }

      // Hide splash and mount the app
      const splash = document.getElementById('boot-splash');
      if (splash) splash.classList.add('hidden');
      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    });
  </script>
</body>
</html>
